<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Haptic Surgical Skill Trainer firmware architecture</title>
  <desc id="desc">Block diagram showing sensors feeding the acquisition task on Core 0, a queue between cores, processing on Core 1, and JSON telemetry to the GUI.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .frame { fill: #ffffff; stroke: #16324f; stroke-width: 3; rx: 20; ry: 20; }
      .core { fill: #edf4ff; stroke: #245b94; stroke-width: 2.5; rx: 16; ry: 16; }
      .queue { fill: #eefbf3; stroke: #2f8a57; stroke-width: 2.5; rx: 16; ry: 16; }
      .host { fill: #fff7ec; stroke: #b56a16; stroke-width: 2.5; rx: 16; ry: 16; }
      .sensor { fill: #f4efff; stroke: #6d4db3; stroke-width: 2.5; rx: 16; ry: 16; }
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #10253b; }
      .subtitle { font: 600 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #16324f; }
      .body { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17324d; }
      .small { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #28455f; }
      .label { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #10253b; }
      .arrow { stroke: #17324d; stroke-width: 3.5; fill: none; marker-end: url(#arrowhead); }
      .arrow2 { stroke: #2f8a57; stroke-width: 4; fill: none; marker-end: url(#arrowheadGreen); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#17324d"/>
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#2f8a57"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text class="title" x="600" y="48" text-anchor="middle">Haptic Surgical Skill Trainer Architecture</text>
  <text class="small" x="600" y="78" text-anchor="middle">100 Hz acquisition on Core 0, processing and host I/O on Core 1, GUI over UART0 at 20 Hz</text>

  <rect class="sensor" x="60" y="140" width="240" height="120"/>
  <text class="subtitle" x="180" y="178" text-anchor="middle">Sensors</text>
  <text class="body" x="180" y="214" text-anchor="middle">3× FSR 402</text>
  <text class="body" x="180" y="240" text-anchor="middle">BNO085 UART-RVC IMU</text>

  <rect class="frame" x="335" y="110" width="530" height="470"/>
  <text class="subtitle" x="600" y="150" text-anchor="middle">ESP32 Firmware</text>

  <rect class="core" x="370" y="185" width="215" height="330"/>
  <text class="subtitle" x="478" y="222" text-anchor="middle">Core 0</text>
  <text class="label" x="478" y="250" text-anchor="middle">Acquisition</text>
  <text class="body" x="478" y="292" text-anchor="middle">esp_timer callback</text>
  <text class="small" x="478" y="316" text-anchor="middle">every 10,000 µs</text>
  <text class="body" x="478" y="352" text-anchor="middle">xSemaphoreGive()</text>
  <text class="body" x="478" y="388" text-anchor="middle">acquisition_task wakes</text>
  <text class="body" x="478" y="424" text-anchor="middle">read ADC + IMU</text>
  <text class="body" x="478" y="460" text-anchor="middle">pack raw_sample_t</text>
  <text class="small" x="478" y="490" text-anchor="middle">deadline-driven path</text>

  <rect class="queue" x="530" y="610" width="140" height="82"/>
  <text class="subtitle" x="600" y="644" text-anchor="middle">Queue</text>
  <text class="small" x="600" y="670" text-anchor="middle">10 × raw_sample_t</text>

  <rect class="core" x="615" y="185" width="215" height="330"/>
  <text class="subtitle" x="723" y="222" text-anchor="middle">Core 1</text>
  <text class="label" x="723" y="250" text-anchor="middle">Processing</text>
  <text class="body" x="723" y="292" text-anchor="middle">xQueueReceive()</text>
  <text class="body" x="723" y="328" text-anchor="middle">IIR filtering</text>
  <text class="body" x="723" y="364" text-anchor="middle">contact + state logic</text>
  <text class="body" x="723" y="400" text-anchor="middle">tremor + force scoring</text>
  <text class="body" x="723" y="436" text-anchor="middle">UART command parsing</text>
  <text class="body" x="723" y="472" text-anchor="middle">JSON telemetry</text>
  <text class="small" x="723" y="500" text-anchor="middle">host-facing path</text>

  <rect class="host" x="900" y="140" width="240" height="120"/>
  <text class="subtitle" x="1020" y="178" text-anchor="middle">Host GUI</text>
  <text class="body" x="1020" y="214" text-anchor="middle">Calibration wizard</text>
  <text class="body" x="1020" y="240" text-anchor="middle">Plots + hand visualizer</text>

  <rect class="host" x="900" y="330" width="240" height="140"/>
  <text class="subtitle" x="1020" y="368" text-anchor="middle">Calibration</text>
  <text class="body" x="1020" y="404" text-anchor="middle">C1 Still Hand</text>
  <text class="body" x="1020" y="430" text-anchor="middle">C2 Relaxed Fingers</text>
  <text class="body" x="1020" y="456" text-anchor="middle">C3 Light Grip</text>
  <text class="body" x="1020" y="482" text-anchor="middle">C4 Hand Motion</text>

  <path class="arrow" d="M300 200 C320 200, 340 235, 370 235"/>
  <path class="arrow2" d="M478 515 C478 560, 535 610, 585 610"/>
  <path class="arrow2" d="M723 515 C723 560, 665 610, 615 610"/>
  <path class="arrow" d="M830 260 C860 260, 880 220, 900 220"/>
  <path class="arrow" d="M900 400 C870 400, 852 400, 830 400"/>

  <text class="small" x="870" y="246" text-anchor="middle">UART0 JSON ~20 Hz</text>
  <text class="small" x="870" y="390" text-anchor="middle">Commands: C1-C4, E/M/H, Z</text>

  <rect class="frame" x="80" y="610" width="190" height="80"/>
  <text class="body" x="175" y="644" text-anchor="middle">Why it is real-time:</text>
  <text class="small" x="175" y="671" text-anchor="middle">sampling must finish every 10 ms</text>

  <rect class="frame" x="910" y="610" width="210" height="80"/>
  <text class="body" x="1015" y="644" text-anchor="middle">Why it is multitasking:</text>
  <text class="small" x="1015" y="671" text-anchor="middle">tasks split across FreeRTOS + two cores</text>
</svg>
